name: data-cleaning-env
description: Environment for cleaning messy datasets
version: 1.0

observation_space:
  type: object
  properties:
    dataset:
      type: array

action_space:
  type: object
  properties:
    cleaned_data:
      type: array

reward:
  type: float
  min: 0.1
  max: 0.9

tasks:
  - name: easy
    grader: env.grader.Grader
  - name: medium
    grader: env.grader.Grader
  - name: hard
    grader: env.grader.Grader
